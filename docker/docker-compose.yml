services:
  # -----------------------------------------------------------
  # Inference GPU: FoundationPose / GDR-Net evaluation con CUDA
  # -----------------------------------------------------------
  # Requiere NVIDIA GPU + nvidia-container-toolkit.
  # No usar en Mac M1 (no tiene CUDA). Usar en Vast.ai, RunPod,
  # Lambda Cloud, servidor UNIR o cualquier host con GPU NVIDIA.
  inference-gpu:
    build:
      context: ..
      dockerfile: docker/inference-gpu.Dockerfile
      args:
        FP_COMMIT: main  # cambiar a SHA específico para reproducibilidad total
    container_name: tfm_inference_gpu
    image: ghcr.io/giocrisrai/pose6dof-inference:cu121

    # GPU passthrough
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    environment:
      - REPO_DIR=/workspace/repo_tfm
      - DATASETS_DIR=/datasets
      - WEIGHTS_DIR=/weights/foundationpose
      - RESULTS_DIR=/workspace/results
      - FP_DIR=/opt/FoundationPose
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics

    # Volúmenes: código + datasets + pesos + resultados
    volumes:
      - ..:/workspace/repo_tfm
      # Ajustar rutas según dónde tengas datasets y pesos localmente
      # o cómo los montes en Vast.ai/RunPod:
      - ${DATASETS_HOST:-/tmp/datasets}:/datasets
      - ${WEIGHTS_HOST:-/tmp/weights}:/weights
      - ../experiments/results:/workspace/results

    stdin_open: true
    tty: true
    command: bash

  # -----------------------------------------------------------
  # Simulación ROS 2 + MoveIt + CoppeliaSim (sin GPU NVIDIA)
  # -----------------------------------------------------------
  ros2-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: tfm_ros2_sim
    image: tfm-pose6dof:humble

    # GUI support (XQuartz en macOS)
    environment:
      - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - ROS_DOMAIN_ID=42

    # Volúmenes: código fuente y datos montados
    volumes:
      - ../src:/ros2_ws/src/pose6dof
      - ../data:/ros2_ws/data
      - ../experiments:/ros2_ws/experiments
      - ../notebooks:/ros2_ws/notebooks
      # CoppeliaSim (descargar manualmente y montar)
      # - ~/CoppeliaSim_Edu:/opt/CoppeliaSim

    # Red: permitir comunicación ROS 2 DDS
    network_mode: host

    # Recursos
    deploy:
      resources:
        limits:
          memory: 8G

    stdin_open: true
    tty: true
    command: bash

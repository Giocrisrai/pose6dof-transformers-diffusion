name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies (sin pesos pesados)
        run: |
          uv venv
          # Solo instalar deps base (sin foundationpose/gdrnet C++)
          uv pip install --quiet \
            numpy>=1.26 \
            scipy>=1.11 \
            torch>=2.1 \
            matplotlib>=3.8 \
            opencv-python-headless>=4.8 \
            trimesh>=4.0 \
            pyyaml \
            tqdm \
            pytest>=8.0 \
            scikit-learn \
            pillow

      - name: Run pytest
        run: |
          source .venv/bin/activate
          pytest tests/ -v --tb=short -x \
            --ignore=tests/test_foundationpose_*.py \
            --ignore=tests/test_gdrnet_*.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            tests/.pytest_cache/

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Lint
        run: ruff check src/ tests/ --output-format=github || true

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Install dependencies (sin pesos pesados)
        run: |
          uv venv
          # Core scientific + pipeline base
          uv pip install --quiet \
            numpy>=1.26 \
            scipy>=1.11 \
            torch>=2.1 \
            torchvision>=0.16 \
            matplotlib>=3.8 \
            opencv-python-headless>=4.8 \
            trimesh>=4.0 \
            pyyaml \
            tqdm \
            pytest>=8.0 \
            scikit-learn \
            pillow
          # API REST (tests/test_api_server.py - exploracion deploy)
          uv pip install --quiet \
            fastapi \
            "uvicorn[standard]" \
            pydantic \
            requests
          # CLIP/VLA-lite (tests/test_vla_lite_modules.py)
          uv pip install --quiet transformers
          # CoppeliaSim ZMQ client (tests/test_coppeliasim_bridge.py — solo
          # cliente Python, no requiere la app CoppeliaSim instalada)
          uv pip install --quiet coppeliasim-zmqremoteapi-client
          # Paquete propio bop-bootstrap-ci (exploracion #1)
          uv pip install --quiet -e packages/bop_bootstrap_ci

      - name: Run pytest (TFM + paquete PyPI)
        run: |
          source .venv/bin/activate
          # Tests del TFM, excluyendo integration tests que requieren CoppeliaSim
          pytest tests/ -v --tb=short -m "not integration" \
            --ignore=tests/test_foundationpose_*.py \
            --ignore=tests/test_gdrnet_*.py
          # Tests del paquete PyPI bop-bootstrap-ci (27 tests)
          pytest packages/bop_bootstrap_ci/tests/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            .pytest_cache/
            tests/.pytest_cache/

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Lint
        run: ruff check src/ tests/ --output-format=github || true

# Blueprint de deploy en Render.com (Docker, un clic).
# Sirve la aplicación unificada: dashboard ejecutivo en / + API REST del pipeline.
# Uso: New > Blueprint > conectar este repo. Render detecta render.yaml.
# También válido como referencia para Fly.io / Hugging Face Spaces (Docker SDK).
services:
  - type: web
    name: tfm-pose6dof-app
    runtime: docker
    dockerfilePath: docker/api.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    # El CMD del Dockerfile ya arranca uvicorn en ${PORT:-8000} (dashboard en /,
    # API en /docs), así que Render lo usa tal cual con su $PORT.
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
